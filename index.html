<!DOCTYPE html>
<html lang="zh-MO">
<head>
  <meta charset="UTF-8" />
  <title>澳門街道照片計劃</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="記錄澳門街道的當下與變遷" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>澳門街道照片計劃</h1>
    <p>Rua Macau · Street Photography Archive</p>
  </header>

  <main>
    <!-- 控制面板 -->
    <section class="controls">
      <div class="proxy-control">
        <label for="proxy-input">代理地址（可选）：</label>
        <input
          type="text"
          id="proxy-input"
          placeholder="https://your-proxy.com/"
          autocomplete="off"
        />
        <button id="proxy-save">保存</button>
        <span id="proxy-status"></span>
      </div>
      <div class="nav">
        <button id="prev-btn" disabled>← 上一張</button>
        <span id="photo-counter"></span>
        <button id="next-btn" disabled>下一張 →</button>
      </div>
    </section>

    <!-- 照片瀏覽區 -->
    <section class="viewer" id="viewer">
      <div id="photo-container">
        <p class="status">載入中...</p>
      </div>
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="photo-info" id="photo-info"></div>
    </section>

    <!-- 評論區（Utterances） -->
    <section class="comments-section">
      <h2>💬 評論</h2>
      <div id="utterances-container"></div>
    </section>
  </main>

  <footer>
    <p>© rua-macau · 澳門街道照片檔案 · 嚴禁盜用</p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
