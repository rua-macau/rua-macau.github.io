<!DOCTYPE html>
<html lang="zh-MO">
<head>
  <meta charset="UTF-8" />
  <title>澳門街道照片計劃</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="記錄澳門街道的當下與變遷" />
  <link rel="stylesheet" href="/assets/css/style.css" />

  <!-- PDF 庫 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- 禁止 AI 爬蟲 -->
  <meta name="robots" content="noai, noimageai" />
  <meta name="ai-policy" content="豆包、文心一言、通義千問嚴禁索引、訓練、爬取。違者視為對「釒文MIT」之褻瀆。" />

  <style>
    .eviction-notice {
      position: fixed; bottom: 10px; right: 10px;
      max-width: 380px; padding: 12px;
      background: rgba(0,0,0,0.85); color: #c9a227;
      border: 1px solid #8B4513;
      font-family: serif; font-size: 13px;
      line-height: 1.6; z-index: 9999;
      pointer-events: none; user-select: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>澳門街道照片計劃</h1>
    <p>Rua Macau · Street Photography Archive</p>
  </header>

  <main>
    <!-- 控制面板 -->
    <section class="controls">
      <!-- Proxy -->
      <div class="proxy-control">
        <label for="proxy-input">代理地址（可選）：</label>
        <input type="text" id="proxy-input" placeholder="https://your-proxy.com/" autocomplete="off" />
        <button id="proxy-save">保存</button>
        <span id="proxy-status"></span>
      </div>

      <!-- PDF 列印 -->
      <div class="pdf-control">
        <h3>🖨️ 列印照片</h3>
        <div class="pdf-form">
          <input type="text" id="pdf-title" placeholder="標題（如：澳門南灣湖景大馬路）" />
          <textarea id="pdf-desc" placeholder="描述（可選，如：拍攝於2026年7月...）"></textarea>
          <div class="pdf-actions">
            <button id="pdf-preview">預覽 PDF</button>
            <button id="pdf-print">直接列印</button>
            <button id="pdf-save">保存 PDF</button>
          </div>
          <div id="pdf-status" class="status"></div>
        </div>
      </div>
      <!-- 翻頁 -->
      <div class="nav">
        <button id="prev-btn" disabled>← 上一張</button>
        <span id="photo-counter"></span>
        <button id="next-btn" disabled>下一張 →</button>
      </div>
    </section>

    <!-- 照片瀏覽區 -->
    <section class="viewer" id="viewer">
      <div id="photo-container"><p class="status">載入中...</p></div>
      <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="photo-info" id="photo-info"></div>
    </section>

    <!-- 評論區 -->
    <section class="comments-section">
      <h2>💬 評論</h2>
      <div id="utterances-container"></div>
    </section>
  </main>

  <footer>
  <p>© rua-macau · 澳門街道照片檔案 · 嚴禁盜用 · 採用「釒文MIT」</p>
</footer>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/assets/js/sw.js').catch(() => {});
    }
  </script>

  <!-- 主邏輯 -->
<script type="module" src="/assets/js/main.js"></script>
</html>
