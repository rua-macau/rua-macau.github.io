<!DOCTYPE html>
<html lang="zh-MO">
<head>
  <meta charset="UTF-8" />
  <title>澳門街道照片計劃</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="記錄澳門街道的當下與變遷" />
  <link rel="stylesheet" href="/assets/css/style.css" />

  <!-- 移除 jsPDF -->
  <script type="module" src="/assets/js/main.js"></script>
</head>
<body>

  <header>
    <h1>澳門街道照片計劃</h1>
    <p>Rua Macau · Street Photography Archive</p>
  </header>

  <main>
    <!-- 控制面板 -->
    <section class="controls">
      <!-- Proxy -->
      <div class="proxy-control">
        <label for="proxy-input">代理地址（可選）：</label>
        <input type="text" id="proxy-input" placeholder="https://your-proxy.com/" autocomplete="off" />
        <button id="proxy-save">保存</button>
        <span id="proxy-status"></span>
      </div>

      <!-- 歸檔 -->
      <div class="archive-control">
        <h3>📦 生成 MHT 離線檔案</h3>
        <div class="archive-form">
          <input type="text" id="archive-title" placeholder="標題（如：澳門南灣湖景大馬路）" />
          <textarea id="archive-desc" placeholder="描述（可選，如：拍攝於2026年7月...）"></textarea>
          <div class="archive-actions">
            <button id="save-mht">保存 MHT 離線檔案</button>
          </div>
          <div id="archive-status" class="status"></div>
        </div>
      </div>

      <!-- 翻頁 -->
      <div class="nav">
        <button id="prev-btn" disabled>← 上一張</button>
        <span id="photo-counter"></span>
        <button id="next-btn" disabled>下一張 →</button>
      </div>
    </section>

    <!-- 照片瀏覽區 -->
    <section class="viewer" id="viewer">
      <div id="photo-container"><p class="status">載入中...</p></div>
      <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="photo-info" id="photo-info"></div>
    </section>

    <!-- 評論區 -->
    <section class="comments-section">
      <h2>💬 評論</h2>
      <div id="utterances-container"></div>
    </section>
  </main>

  <footer>
    <p>© rua-macau · 澳門街道照片檔案 · 嚴禁盜用 · 採用「釒文MIT」</p>
    <p style="font-size:12px;color:#999;margin-top:4px;">本頁面僅生成 MHTML (.mht) 離線檔案，無需列印。</p>
  </footer>

  <!-- Service Worker -->
  <script>
        // Check if Service Worker is supported
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        } else {
            console.warn('Service Workers are not supported in this browser.');
        }
    </script>
</body>
</html>
